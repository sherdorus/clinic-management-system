name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/clinic-management-system:latest
            ${{ secrets.DOCKER_USERNAME }}/clinic-management-system:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            
            cd /opt/clinic
            
            echo "Pull latest image..."
            docker compose pull app
            
            echo "Start application..."
            docker compose up -d app
            
            echo "Waiting for application to become healthy..."
            
            timeout=180
            elapsed=0
            
            while true; do
              status=$(docker inspect --format='{{.State.Health.Status}}' clinic-app-1)
            
              echo "Current status: $status"
            
              if [ "$status" = "healthy" ]; then
                echo "Application is healthy."
                break
              fi
            
              if [ "$status" = "unhealthy" ]; then
                echo "Application became unhealthy."
                docker compose logs --tail=100 app
                exit 1
              fi
            
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "Timed out waiting for healthy status."
                docker compose logs --tail=100 app
                exit 1
              fi
            
              sleep 5
              elapsed=$((elapsed + 5))
            done
            
            echo ""
            echo "Containers:"
            docker compose ps
            
            echo ""
            echo "Application logs:"
            docker compose logs --tail=50 app